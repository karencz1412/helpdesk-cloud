name: HelpDesk Cloud CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias backend
        working-directory: backend
        run: npm install

      - name: Pruebas backend
        working-directory: backend
        run: npm test

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm install

      - name: Pruebas frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Login Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push backend
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-backend:latest

      - name: Build y push frontend
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/helpdesk-frontend:latest

      - name: Deploy en Azure VM con Docker Swarm
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd ~/helpdesk-cloud
            git pull origin main
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            docker pull $DOCKERHUB_USERNAME/helpdesk-backend:latest
            docker pull $DOCKERHUB_USERNAME/helpdesk-frontend:latest
            docker stack deploy -c stack.yml helpdesk
            docker service ls
