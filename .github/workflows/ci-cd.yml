name: HelpDesk Cloud CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-build:
    name: Test and Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias backend
        working-directory: backend
        run: npm install

      - name: Ejecutar pruebas backend
        working-directory: backend
        run: npm test

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm install

      - name: Ejecutar pruebas frontend
        working-directory: frontend
        run: npm test

      - name: Construir imagen Docker backend
        run: docker build -t helpdesk-cloud-backend ./backend

      - name: Construir imagen Docker frontend
        run: docker build -t helpdesk-cloud-frontend ./frontend

      - name: Validación completada
        run: echo "Pipeline CI/CD validado correctamente"